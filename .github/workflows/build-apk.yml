name: Build PokeClaw with API Bridge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout bridge repo
        uses: actions/checkout@v4

      - name: Clone PokeClaw
        run: git clone --depth 1 https://github.com/agents-io/PokeClaw.git /tmp/pokeclaw

      - name: Apply patches
        run: |
          cp ConfigServer.kt /tmp/pokeclaw/app/src/main/java/io/agents/pokeclaw/server/ConfigServer.kt
          cp ClawApplication.kt /tmp/pokeclaw/app/src/main/java/io/agents/pokeclaw/ClawApplication.kt
          echo "✅ ConfigServer.kt patched"
          grep -c "127.0.0.1" /tmp/pokeclaw/app/src/main/java/io/agents/pokeclaw/server/ConfigServer.kt && echo "✅ Binding to 127.0.0.1"
          echo "✅ ClawApplication.kt patched"
          grep -c "autoStartIfNeeded" /tmp/pokeclaw/app/src/main/java/io/agents/pokeclaw/ClawApplication.kt && echo "✅ Auto-start added"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: /tmp/pokeclaw
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          ls -lh app/build/outputs/apk/debug/

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.6.12-bridge
          name: PokeClaw v0.6.12 + LAN API Bridge
          files: /tmp/pokeclaw/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
