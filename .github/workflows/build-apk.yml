name: Build PokeClaw with API Bridge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bridge repo
        uses: actions/checkout@v4

      - name: Clone PokeClaw
        run: git clone --depth 1 https://github.com/agents-io/PokeClaw.git /tmp/pokeclaw

      - name: Apply ConfigServer patch
        run: |
          cp ConfigServer.kt /tmp/pokeclaw/app/src/main/java/io/agents/pokeclaw/server/ConfigServer.kt
          echo "=== Verification ==="
          grep -c "0.0.0.0" /tmp/pokeclaw/app/src/main/java/io/agents/pokeclaw/server/ConfigServer.kt && echo "✅ Binding: 0.0.0.0"
          grep -c "handlePostTask" /tmp/pokeclaw/app/src/main/java/io/agents/pokeclaw/server/ConfigServer.kt && echo "✅ Endpoint: /api/task"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: /tmp/pokeclaw
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          ls -lh app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PokeClaw-Bridge-APK
          path: /tmp/pokeclaw/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
