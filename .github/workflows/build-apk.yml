name: Build PokeClaw with API Bridge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone PokeClaw
        run: |
          git clone --depth 1 https://github.com/agents-io/PokeClaw.git /tmp/pokeclaw
          echo "Cloned OK"

      - name: Patch ConfigServer — bind to 0.0.0.0
        working-directory: /tmp/pokeclaw
        run: |
          FILE="app/src/main/java/io/agents/pokeclaw/server/ConfigServer.kt"
          
          # 1. Change 127.0.0.1 to 0.0.0.0
          sed -i 's/NanoHTTPD("127.0.0.1", port)/NanoHTTPD("0.0.0.0", port)/' "$FILE"
          
          # 2. Add imports needed for task execution
          sed -i '/^import android.content.Context$/a import android.content.Intent' "$FILE"
          
          # 3. Find the last endpoint route and add /api/task before it
          LAST_ROUTE_LINE=$(grep -n 'uri.startsWith.*api/debug/file' "$FILE" | head -1 | cut -d: -f1)
          sed -i "${LAST_ROUTE_LINE}i\\                uri == \"/api/task\" && method == Method.POST -> handlePostTask(session)" "$FILE"
          
          # 4. Add handlePostTask method before handleGetLlm
          cat >> /tmp/task_endpoint.kt << 'END'
          
              // ==================== External AI Agent API ====================
          
              private fun handlePostTask(session: IHTTPSession): Response {
                  val files = mutableMapOf<String, String>()
                  session.parseBody(files)
                  val body = files["postData"] ?: ""
          
                  val json = try {
                      gson.fromJson(body, JsonObject::class.java)
                  } catch (e: Exception) {
                      return corsResponse(newFixedLengthResponse(
                          Response.Status.BAD_REQUEST, MIME_JSON,
                          """{"code":-1,"message":"invalid json"}"""))
                  }
          
                  val task = json.get("task")?.asString
                  if (task.isNullOrBlank()) {
                      return corsResponse(newFixedLengthResponse(
                          Response.Status.BAD_REQUEST, MIME_JSON,
                          """{"code":-1,"message":"missing 'task' field"}"""))
                  }
          
                  if (!KVUtils.isExternalAutomationEnabled()) {
                      return corsResponse(newFixedLengthResponse(
                          Response.Status.FORBIDDEN, MIME_JSON,
                          """{"code":-2,"message":"External Automation disabled"}"""))
                  }
          
                  if (appViewModel.isTaskRunning()) {
                      return corsResponse(newFixedLengthResponse(
                          Response.Status.CONFLICT, MIME_JSON,
                          """{"code":-3,"message":"Task already running"}"""))
                  }
          
                  val mode = json.get("mode")?.asString ?: "task"
                  XLog.i(TAG, "API task ($mode): ${task.take(120)}")
          
                  val launch = Intent(context, io.agents.pokeclaw.ui.chat.ComposeChatActivity::class.java).apply {
                      if (mode == "chat") putExtra("chat", task)
                      else putExtra("task", task)
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK
                  }
                  context.startActivity(launch)
          
                  val result = JsonObject().apply {
                      addProperty("code", 0)
                      addProperty("message", "Task accepted")
                      addProperty("mode", mode)
                  }
                  return corsResponse(newFixedLengthResponse(Response.Status.OK, MIME_JSON, result.toString()))
              }
          END
          
          # Insert before handleGetLlm
          INSERT_LINE=$(grep -n 'private fun handleGetLlm' "$FILE" | head -1 | cut -d: -f1)
          INSERT_LINE=$((INSERT_LINE - 1))
          sed -i "${INSERT_LINE}r /tmp/task_endpoint.kt" "$FILE"
          
          # Verify changes  
          grep -c "0.0.0.0" "$FILE" && echo "✅ Binding patched"
          grep -c "handlePostTask" "$FILE" && echo "✅ Endpoint added"
          tail -5 "$FILE"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: /tmp/pokeclaw
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          ls -lh app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PokeClaw-Bridge-APK
          path: /tmp/pokeclaw/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
